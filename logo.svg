<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background -->
  <rect width="256" height="256" rx="40" fill="#1a1a2e"/>

  <!-- Bluetooth bolt symbol -->
  <polygon points="128,40 100,128 124,128 96,216 164,112 136,112 164,40"
           fill="none" stroke="#4fc3f7" stroke-width="6" stroke-linejoin="round"/>

